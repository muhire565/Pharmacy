# Render Blueprint: New → Blueprint → connect repo.
# Create a PostgreSQL instance, then set secret env vars on the web service (Dashboard or here with sync: false).

services:
  - type: web
    name: pharmacy-backend
    runtime: docker
    dockerfilePath: ./pharmacy-backend/Dockerfile
    dockerContext: ./pharmacy-backend
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JAVA_OPTS
        value: "-XX:MaxRAMPercentage=75.0 -XX:+UseContainerSupport"
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
