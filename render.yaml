# Render Blueprint: New → Blueprint → connect repo.
# Create a PostgreSQL instance, then set secret env vars on the web service (Dashboard or here with sync: false).
#
# If logs show “No open ports detected” until the app is up: Spring cold start can take 1–3 min on
# starter hardware. In the Render dashboard → Health Checks, increase “Health Check Grace Period”
# (e.g. 180–300s) so the first deploy isn’t marked unhealthy while the JVM + Flyway + DB connect.

services:
  - type: web
    name: pharmacy-backend
    runtime: docker
    dockerfilePath: ./pharmacy-backend/Dockerfile
    dockerContext: ./pharmacy-backend
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JAVA_OPTS
        value: "-XX:MaxRAMPercentage=75.0 -XX:+UseContainerSupport"
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      # Optional: persistent logo uploads (default ./uploads/pharmacies in container is ephemeral)
      # - key: APP_STORAGE_UPLOAD_DIR
      #   value: /var/pharmacy-uploads
