# SPRING_PROFILES_ACTIVE=prod is set by the host (e.g. Render). Do not set spring.profiles.active here.
#
# Database URL on Render must be JDBC form, e.g.:
#   jdbc:postgresql://HOST:5432/DATABASE
# If you paste a value that starts with //host:5432/db (missing jdbc:postgresql:), or postgres://…,
# the app will normalize it at startup. Prefer setting the full jdbc: URL in the dashboard.

app.data.seed=false

# Render / Docker: PORT from host; bind all interfaces for the proxy.
server.port=${PORT:8080}
server.address=0.0.0.0

spring.main.banner-mode=off
spring.jmx.enabled=false
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.cors.allowed-origins=${CORS_ORIGINS}

app.storage.upload-dir=${APP_STORAGE_UPLOAD_DIR:/data/uploads/pharmacies}

logging.level.root=WARN
logging.level.com.pharmacy=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
