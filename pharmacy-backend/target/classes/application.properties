# JWT (override in production via env)
jwt.secret=${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# API
app.api.prefix=/api/v1

# Multipart (pharmacy logo max 2MB — enforced in code as well)
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=3MB

# Uploaded logos (override in production)
app.storage.upload-dir=${APP_STORAGE_UPLOAD_DIR:./uploads/pharmacies}

# CORS (comma-separated origins; * for dev only)
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# Expiry warning window (days)
app.inventory.expiry-warning-days=30

# Overridden to true in application-dev.properties when profile dev is active
app.data.seed=${APP_DATA_SEED:false}

# Actuator
management.endpoints.web.exposure.include=health,info

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

logging.level.com.pharmacy=INFO
logging.level.org.springframework.security=WARN
