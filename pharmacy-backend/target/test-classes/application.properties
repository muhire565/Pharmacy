# Isolate from main application (avoid dev profile + seed during tests)
spring.profiles.active=test

spring.datasource.url=jdbc:h2:mem:pharmacy_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false

jwt.secret=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
jwt.expiration-ms=3600000

app.api.prefix=/api/v1
app.cors.allowed-origins=http://localhost:5173
app.storage.upload-dir=${java.io.tmpdir}/pharmacy-test-uploads

app.data.seed=false
